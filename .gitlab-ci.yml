stages:
  - lint
  - test

lint:
  image: registry.furqansoftware.net/cardboard/staticcheck:0.7.0-1
  stage: lint
  script:
    - task lint

test go-1.26:
  image: registry.furqansoftware.net/cardboard/golang:1.26.1-bullseye-0
  stage: test
  script:
    - go install github.com/jstemmer/go-junit-report/v2@v2.1.0
    - go install github.com/boumenot/gocover-cobertura@v1.4.0
    - go get .
    - go test -cover -coverprofile=profile.cov -v . | go-junit-report -out report.xml -iocopy -set-exit-code
    - $GOPATH/bin/gocover-cobertura < profile.cov > coverage.xml
  coverage: "/coverage: [0-9]+.[0-9]+% of statements/"
  artifacts:
    reports:
      junit: report.xml
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
